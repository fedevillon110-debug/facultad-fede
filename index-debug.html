<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Debug — Mi Facultad</title>
<link rel="stylesheet" href="styles.css?v=20260624.1">
</head>
<body style="background:#15151a;color:#eeeef0;font-family:Inter, system-ui; padding:24px;">
  <h2>Debug: comprobación de assets</h2>
  <p id="badgeCheck">Badge: <span id="badgePresent">?</span></p>
  <p>Iconos:</p>
  <div style="display:flex;gap:12px;align-items:center;">
    <i class="ti ti-menu" style="font-size:28px;"></i>
    <i class="ti ti-plus" style="font-size:28px;"></i>
    <i class="ti ti-trash" style="font-size:28px;"></i>
    <i class="ti ti-chevron-left" style="font-size:28px;"></i>
  </div>
  <p id="pdfLib">pdf-lib: <span>?</span></p>
  <script src="https://cdn.jsdelivr.net/npm/pdf-lib/dist/pdf-lib.min.js"></script>
  <script>
    document.getElementById('badgePresent').textContent = !!document.querySelector('#devBadge') ? 'devBadge exists' : 'no devBadge in main page (this is separate)';
    document.getElementById('pdfLib').querySelector('span').textContent = (typeof PDFLib !== 'undefined') ? 'loaded' : 'not loaded';
    console.log('styles link:', document.querySelector('link[href*="styles.css"]'));
  </script>
</body>
</html>
